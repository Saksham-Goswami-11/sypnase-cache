name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: false

    - name: Build
      run: go build -v ./...

    - name: Test (Race Detector)
      run: go test -race -short -timeout 10m -v ./...

    - name: Test (Full Suite)
      run: go test -timeout 30m -v ./...
