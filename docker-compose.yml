version: '3.8'

services:
  synapse-db:
    build: 
      context: .
      dockerfile: Dockerfile
    image: synapse-cache:latest
    container_name: synapse-db
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - SYNAPSE_PASSWORD=${SYNAPSE_PASSWORD:-mysecret}
      - SYNAPSE_PORT=6379
      - SYNAPSE_AOF_PATH=/data/synapse.aof
    volumes:
      - synapse_data:/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  synapse_data:
